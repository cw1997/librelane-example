name: LibreLane (Nix Docker)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'docker/librelane-ci/**'
              - '.github/workflows/librelane-ci.yml'

  build-librelane-ci:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.changes.outputs.docker == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GHCR image base (lowercase)
        run: echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/librelane-ci/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:librelane-nix-ci
            ${{ env.GHCR_IMAGE }}:librelane-nix-ci-${{ github.sha }}
          build-args: |
            LIBRELANE_REF=main

  run-default-flow:
    needs: [changes, build-librelane-ci]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-librelane-ci.result == 'success' ||
       needs.build-librelane-ci.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: GHCR image base (lowercase)
        run: echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "${GHCR_IMAGE}:librelane-nix-ci"

      - name: Run default flow (Classic)
        run: |
          docker run --rm \
            --shm-size=2g \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${GHCR_IMAGE}:librelane-nix-ci" \
            nix-shell /librelane/shell.nix --run "librelane --log-level ERROR --condensed --show-progress-bar config.json"
